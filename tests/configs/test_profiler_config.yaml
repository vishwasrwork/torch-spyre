test_suite_config:
  files:
    # Classes: TestProfiler, TestExperimentalUtils, TestProfilerEventsParity None of these use instantiate_device_type_tests(). 
    - path: ${TORCH_ROOT}/test/profiler/test_profiler.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestProfiler::test_kineto
            - TestProfiler::test_module_hierarchy
            - TestProfiler::test_profiler_correlation_id
            - TestProfiler::test_memory_profiler
            - TestProfiler::test_flops
            - TestProfiler::test_kineto_profiler_api
            - TestProfiler::test_tensorboard_trace_handler
            - TestProfiler::test_profiler_tracing
            - TestProfiler::test_basic_chrome_trace
            - TestProfiler::test_cpu_annotation_overlap
            - TestProfiler::test_user_annotation
            - TestExperimentalUtils::test_utils_compute_idle_time
          mode: mandatory_success

        - names:
            # RuntimeError: VFIO DeviceOpenFail during profiler teardown ->
            # subprocess exit 255 -> AssertionError: Kineto is not working
            # properly with the Dynolog environment variable (segfault in
            # ProfilerStateBase destructor). Needs PrivateUse1 activity
            # check and device-init guard in subprocess snippet.
            - TestProfiler::test_kineto_profiler_with_environment_variable
            # SKIPPED: @unittest.skipUnless(TEST_CUDA or TEST_XPU, "requires gpu")
            # Needs TEST_SPYRE added to upstream skip decorator.
            - TestProfiler::test_basic_profile
            # SKIPPED: @unittest.skipIf(not torch.cuda.is_available()) —
            # needs Spyre guard; forward portion only (has backward).
            - TestProfiler::test_event_list
            # SKIPPED: @unittest.skipIf(not torch.cuda.is_available()) —
            # needs Spyre guard + ProfilerActivity swap.
            - TestProfiler::test_dynamic_toggle
            # Class-level @skipIf(not torch.cuda.is_available()) blocks
            # all 4 tests silently. Needs: class gate +
            # ProfilerActivity.CUDA -> PrivateUse1, device="cuda" -> "spyre".
            - TestProfilerEventsParity::test_profiler_flow_events_parity
            - TestProfilerEventsParity::test_profiler_timestamp_consistency
            - TestProfilerEventsParity::test_profiler_external_id_parity
            - TestProfilerEventsParity::test_profiler_activity_type_parity
          mode: skip

    # TestMemoryProfilerTimeline uses instantiate_device_type_tests() with only_for=DEVICE_LIST_SUPPORT_PROFILING_TEST = ('cpu', 'cuda', 'xpu').
    - path: ${TORCH_ROOT}/test/profiler/test_memory_profiler.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestMemoryProfilerTimeline::test_memory_timeline_no_id
          mode: mandatory_success

    # =========================================================================
    # test_cpp_thread.py
    #
    # CppThreadTestCUDA: standalone class, setUp() gates on
    # torch.cuda.is_available(). XPU added by duplicating the entire class
    # as CppThreadTestXPU (instantiate_device_type_tests can't work here
    # because setUpClass() needs the concrete class to register EventHandler).
    # Spyre needs same pattern: create CppThreadTestSpyre.
    # =========================================================================
    - path: ${TORCH_ROOT}/test/profiler/test_cpp_thread.py
      unlisted_test_mode: skip
      tests:
        - names:
            # All 3 SKIPPED: "Test machine does not have cuda" — setUp()
            # gates on torch.cuda.is_available(). Needs CppThreadTestSpyre
            # class (follow CppThreadTestXPU pattern in upstream).
            - CppThreadTestCUDA::test_with_enable_profiler_in_child_thread_cuda
            - CppThreadTestCUDA::test_without_enable_profiler_in_child_thread_cuda
            # Also needs privateuse1_memory_usage support in addition to
            # CppThreadTestSpyre class.
            - CppThreadTestCUDA::test_profile_memory_cuda
          mode: skip

    # =========================================================================
    # test_execution_trace.py
    #
    # TestExecutionTrace uses instantiate_device_type_tests() with
    # only_for=["cpu", "cuda"] + optional xpu/hpu - no privateuse1.
    # =========================================================================
    - path: ${TORCH_ROOT}/test/profiler/test_execution_trace.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestExecutionTrace::test_execution_trace_with_kineto
            - TestExecutionTrace::test_execution_trace_alone
            - TestExecutionTrace::test_execution_trace_env_disabled
            - TestExecutionTrace::test_execution_trace_start_stop
            - TestExecutionTrace::test_execution_trace_repeat_in_loop
          mode: mandatory_success

        - names:
            # AssertionError: Scalars are not close! Expected 0 but got 3.
            # ET output dir has 3 unexpected files when env-var should
            # disable trace collection. Likely env-var check not honored
            # on Spyre path.
            - TestExecutionTrace::test_execution_trace_env_enabled_with_kineto
            # SKIPPED: "torch.compile is not supported on python 3.12+" —
            # payload() also calls z.backward() (Spyre is inference-only).
            - TestExecutionTrace::test_execution_trace_with_pt2
            - TestExecutionTrace::test_execution_trace_env_enabled_with_pt2
          mode: skip

  global:
    supported_dtypes:
      - name: float16
      - name: int64
